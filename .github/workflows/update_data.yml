name: Auto Update Parquet

on:
  schedule:
    # Menjalankan otomatis setiap 4 jam
    - cron: '0 */4 * * *'
  # Memungkinkan menjalankan manual dari tab Actions
  workflow_dispatch:

# PENTING: Menambahkan izin agar bot bisa mengunggah file kembali ke repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Microsoft ODBC Driver 17
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python scripts/update_data.py

      - name: Commit and Push Parquet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Pastikan file tidak di-ignore di .gitignore, jika ragu gunakan git add -f
          git add data/peta_murid.parquet
          git commit -m "Update data peta: $(date)" || echo "No changes to commit"
          git push